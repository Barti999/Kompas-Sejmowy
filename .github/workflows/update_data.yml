name: Aktualizuj dane Sejmu

on:
  schedule:
    - cron: '0 3 * * 0'   # Co niedzielę o 3:00 UTC
  workflow_dispatch:        # Możliwość ręcznego uruchomienia z GitHuba

jobs:
  aktualizuj:
    runs-on: ubuntu-latest

    steps:
      - name: Pobierz repozytorium
        uses: actions/checkout@v4

      - name: Skonfiguruj Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Zainstaluj zależności
        run: pip install -r scripts/requirements.txt

      - name: Aktualizuj posłów
        run: python scripts/update_poslowie.py

      - name: Aktualizuj kluby
        run: python scripts/update_kluby.py

      - name: Aktualizuj głosowania
        run: python scripts/update_glosowania.py

      - name: Zapisz zmiany do repozytorium
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "Automatyczna aktualizacja danych $(date +%Y-%m-%d)"
          git push
