<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kompas Sejmowy</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background: #f8f9fa; }
        h1 { color: #2c3e50; }
        table { border-collapse: collapse; width: 100%; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #3498db; color: white; }
        tr:nth-child(even) { background-color: #f2f2f2; }
    </style>
</head>
<body>
    <h1>Kompas Sejmowy – Kadencja X</h1>
    <p><strong>Liczba posłów:</strong> <span id="liczba-poslow">Ładowanie...</span></p>
    <p><strong>Ostatnie posiedzenie:</strong> <span id="ostatnie-posiedzenie">Ładowanie...</span></p>

    <h2>Lista posłów (pierwsze 20)</h2>
    <table id="tabela-poslow">
        <thead>
            <tr>
                <th>Nr</th>
                <th>Imię i nazwisko</th>
                <th>Klub</th>
                <th>Aktywny</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <script>
        // Wczytaj posłów
        fetch('data/poslowie.json')
            .then(r => r.json())
            .then(poslowie => {
                document.getElementById('liczba-poslow').textContent = poslowie.length;

                const tbody = document.querySelector('#tabela-poslow tbody');
                poslowie.slice(0, 20).forEach((p, i) => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${i+1}</td>
                        <td>${p.lastFirstName || p.firstName + ' ' + p.lastName}</td>
                        <td>${p.club || '—'}</td>
                        <td>${p.active ? '✅' : '❌'}</td>
                    `;
                    tbody.appendChild(tr);
                });
            });

        // Wczytaj meta
        fetch('data/meta.json')
            .then(r => r.json())
            .then(meta => {
                const gl = meta.glosowania || {};
                document.getElementById('ostatnie-posiedzenie').textContent = gl.ostatnie_posiedzenie || '—';
            });
    </script>
</body>
</html>
